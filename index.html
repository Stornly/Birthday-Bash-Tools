<!DOCTYPE html>
<html lang="en">
<head>
    <!-- This makes social media show YOUR custom thumbnail and text -->
    <meta property="og:title" content="Exciting Video Title Here">
    <meta property="og:description" content="A tempting description that makes them want to click">
    <meta property="og:image" content="https://img.youtube.com/vi/INSERT_VIDEO_ID_HERE/maxresdefault.jpg">
    <meta property="og:url" content="https://YOUR_USERNAME.github.io/YOUR_REPO_NAME">
    <meta property="og:type" content="website">
    
    <!-- Twitter/X card settings -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Exciting Video Title Here">
    <meta name="twitter:description" content="A tempting description that makes them want to click">
    <meta name="twitter:image" content="https://img.youtube.com/vi/INSERT_VIDEO_ID_HERE/maxresdefault.jpg">
    
    <!-- Page title (shows in browser tab) -->
    <title>Exciting Video Title Here</title>
    
    <!-- THE MAGIC: Instant redirect to Rickroll -->
    <meta http-equiv="refresh" content="0; url='https://www.youtube.com/watch?v=dQw4w9WgXcQ'">
    <script>
        window.location.href = 'https://www.youtube.com/watch?v=dQw4w9WgXcQ';
    </script>
</head>
<body>
    <!-- This text only appears if redirect fails (rare) -->
    <p>Redirecting... <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ">Click here if you're not redirected</a></p>
</body>
</html>
